{% extends 'core/base.html' %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/form.css' %}">
{% endblock %}

{% block content %}
<div class="form-box">
    <h2 class="texto">Formulário</h2>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Salvar</button>
    </form>

    <div class="voltar">
        <a href="javascript:history.back()">Voltar</a>
    </div>
</div>
{% endblock %}
